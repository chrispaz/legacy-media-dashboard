<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>LMD</title>
  <script type="text/javascript" src="/lib/jszip.min.js"></script>
  <style>

    /* ── RESET ───────────────────────────────── */
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    body {
      color: #111111;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── APP SHELL ───────────────────────────── */
    #app {
      position: relative;
      height: 100%;
    }

    /* ── HEADER ──────────────────────────────── */
    #lmd-header {
      background: #1a1a1a;
      border-bottom: 2px solid #111111;
      padding: 8px 14px;
      position: relative;
    }

    #header-logo   { font-size: 1.05em; letter-spacing: 5px; font-weight: bold; color: #ffffff; }
    #header-status { font-size: 0.68em; color: #aaaaaa; margin-left: 10px; letter-spacing: 2px; }
    #header-clock  {
      position: absolute; right: 14px; top: 50%; margin-top: -9px;
      font-size: 0.78em; letter-spacing: 2px; color: #aaaaaa;
    }

    /* ── NAV TABS ────────────────────────────── */
    #lmd-nav { background: #ffffff; border-bottom: 2px solid #1a1a1a; }

    .tab-btn {
      display: inline-block;
      padding: 10px 20px;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.78em; letter-spacing: 2px;
      color: #555555; background: transparent;
      border: none; border-right: 1px solid #e0e0e0;
      cursor: pointer; text-transform: uppercase;
      outline: none; -webkit-appearance: none; min-height: 44px;
    }

    .tab-btn.active {
      background: #1a1a1a; color: #ffffff;
      font-weight: bold;
    }

    /* ── SCROLL AREA ─────────────────────────── */
    #lmd-main {
      position: absolute; left: 0; right: 0;
      background: #f5f5f0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }

    /* ── LOADING ─────────────────────────────── */
    #loading-screen {
      text-align: center; padding: 60px 20px;
      letter-spacing: 3px; font-size: 0.85em; color: #888888;
    }

    .blink {
      -webkit-animation: blink 1s step-end infinite;
      animation: blink 1s step-end infinite;
    }

    @-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes           blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── VIEWS ───────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    .section-label {
      padding: 7px 14px; font-size: 0.65em;
      letter-spacing: 4px; color: #888888;
      border-bottom: 1px solid #e0e0e0;
      text-transform: uppercase; background: #f5f5f0;
    }

    /* ── MÚSICA: LISTA ───────────────────────── */
    .music-item {
      display: block; padding: 13px 14px;
      border-bottom: 1px solid #e8e8e8;
      background: #ffffff;
      cursor: pointer; position: relative; overflow: hidden;
    }

    .music-item:active  { background: #f0f0ec; }
    .music-item.selected {
      background: #f0f0ec; border-left: 3px solid #1a1a1a;
    }
    .music-item.playing { border-left: 3px solid #1a1a1a; background: #f0f0ec; }

    .music-num {
      display: inline-block; color: #bbbbbb;
      font-size: 0.72em; width: 26px;
      text-align: right; margin-right: 10px; vertical-align: middle;
    }

    .music-title {
      display: inline-block; font-size: 0.88em; color: #111111;
      letter-spacing: 1px; text-transform: uppercase; vertical-align: middle;
    }

    .music-meta {
      font-size: 0.68em; color: #666666;
      margin-top: 4px; padding-left: 36px; letter-spacing: 1px;
    }

    .music-duration {
      position: absolute; right: 14px; top: 14px;
      font-size: 0.72em; color: #bbbbbb; letter-spacing: 1px;
    }

    /* ── LIBROS: GRID ────────────────────────── */
    #books-list { padding: 12px; background: #f5f5f0; }

    #books-list:after { content: ""; display: table; clear: both; }

    .book-item {
      float: left; width: 48%; margin-right: 2%;
      margin-bottom: 12px; border: 1px solid #d8d8d8;
      padding: 8px; cursor: pointer; background: #ffffff;
    }

    .book-item:nth-child(2n) { margin-right: 0; }
    .book-item:active    { background: #f0f0ec; }
    .book-item.selected  { border-color: #1a1a1a; background: #f0f0ec; }

    .book-cover-wrap {
      width: 100%; height: 130px;
      background: #f0f0ec; border: 1px solid #e0e0e0;
      display: block; text-align: center; overflow: hidden; margin-bottom: 7px;
    }

    .book-cover-wrap img {
      max-width: 100%; max-height: 130px; display: block; margin: 0 auto;
    }

    .book-cover-placeholder {
      width: 100%; height: 130px;
      background: #f0f0ec; border: 1px solid #e0e0e0;
      display: block; text-align: center; line-height: 130px;
      font-size: 2.2em; color: #cccccc; margin-bottom: 7px;
    }

    .book-title {
      display: block; font-size: 0.78em; color: #111111;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .book-author {
      display: block; font-size: 0.65em; color: #666666; margin-bottom: 5px;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    .book-type-badge {
      display: inline-block; border: 1px solid #333333;
      color: #333333; padding: 1px 5px; font-size: 0.6em; letter-spacing: 2px;
    }

    .book-type-badge.epub { border-color: #1d4ed8; color: #1d4ed8; }
    .book-type-badge.pdf  { border-color: #333333; color: #333333; }

    /* ── PLAYER BAR ──────────────────────────── */
    #player-bar {
      display: none;
      position: absolute; left: 0; right: 0;
      background: #1a1a1a; border-top: 2px solid #333333;
      z-index: 10;
    }

    #player-info {
      padding: 6px 14px 0;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }

    #player-title-text  { font-size: 0.82em; letter-spacing: 1px; text-transform: uppercase; color: #ffffff; }
    #player-artist-text { font-size: 0.65em; color: #aaaaaa; margin-left: 8px; letter-spacing: 1px; }

    #player-controls {
      padding: 4px 14px;
      display: table; width: 100%;
    }

    #player-buttons   { display: table-cell; vertical-align: middle; width: 1%; white-space: nowrap; }
    #player-time      { display: table-cell; vertical-align: middle; width: 1%; white-space: nowrap; text-align: right; font-size: 0.7em; color: #888888; letter-spacing: 1px; padding-left: 8px; }
    #player-prog-cell { display: table-cell; vertical-align: middle; padding: 0 8px; }

    /* ctrl-btn default: fondo claro (para headers de RCP) */
    .ctrl-btn {
      font-family: "Courier New", Courier, monospace;
      background: transparent; color: #333333;
      border: 1px solid #cccccc;
      padding: 4px 8px; font-size: 0.75em; letter-spacing: 1px;
      cursor: pointer; outline: none; -webkit-appearance: none;
      margin-right: 4px; min-height: 32px; min-width: 36px;
    }
    .ctrl-btn:active { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }

    /* ctrl-btn en player bar: fondo oscuro → colores invertidos */
    #player-bar .ctrl-btn {
      color: #ffffff; border-color: #555555;
    }
    #player-bar .ctrl-btn:active { background: #ffffff; color: #1a1a1a; }

    #player-progress-track {
      width: 100%; height: 10px;
      background: #333333; border: 1px solid #444444;
      cursor: pointer; position: relative;
    }

    #player-progress-fill {
      height: 100%; width: 0%;
      background: #ffffff; position: absolute; top: 0; left: 0;
    }

    /* ── READER OVERLAY ──────────────────────── */
    #reader-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50; background: #ffffff;
    }

    #reader-header {
      position: absolute; top: 0; left: 0; right: 0; height: 50px;
      padding: 0 14px; line-height: 50px;
      border-bottom: 1px solid #e0e0e0;
      background: #ffffff;
      overflow: hidden; white-space: nowrap;
    }

    #btn-close-reader {
      font-family: "Courier New", Courier, monospace;
      background: transparent; color: #cc2222;
      border: 1px solid #cc2222; padding: 4px 10px;
      font-size: 0.75em; letter-spacing: 2px;
      cursor: pointer; outline: none; -webkit-appearance: none;
      vertical-align: middle;
    }

    #btn-close-reader:active { background: #cc2222; color: #ffffff; }

    #reader-title-text {
      display: inline-block; font-size: 0.82em; color: #111111;
      letter-spacing: 2px; text-transform: uppercase;
      margin-left: 10px; vertical-align: middle;
    }

    #reader-badge {
      position: absolute; right: 14px; top: 50%; margin-top: -11px;
      border: 1px solid #333333; color: #333333; padding: 2px 6px;
      font-size: 0.65em; letter-spacing: 2px;
    }

    #reader-content {
      position: absolute; top: 50px; left: 0; right: 0; bottom: 0;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: #ffffff;
    }

    #reader-content.with-nav { bottom: 44px; }

    #reader-content iframe {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      border: none; display: block; background: #fff;
    }

    /* contenedor EPUB */
    #epub-inner {
      padding: 20px 24px; color: #111111;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px; line-height: 1.9;
    }

    #epub-inner h1, #epub-inner h2, #epub-inner h3,
    #epub-inner h4, #epub-inner h5, #epub-inner h6 {
      color: #111111; font-family: "Courier New", Courier, monospace;
      letter-spacing: 1px; margin: 24px 0 12px;
    }

    #epub-inner p    { margin-bottom: 14px; }
    #epub-inner a    { color: #1d4ed8; text-decoration: none; }
    #epub-inner img  { max-width: 100%; height: auto; margin: 10px 0; }
    #epub-inner em, #epub-inner i { font-style: italic; }
    #epub-inner strong, #epub-inner b { font-weight: bold; }

    /* nav capítulos EPUB */
    #reader-nav {
      display: none;
      position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
      border-top: 1px solid #e0e0e0; padding: 4px 14px;
      background: #ffffff;
    }

    #reader-nav-inner { display: table; width: 100%; }

    .nav-btn {
      font-family: "Courier New", Courier, monospace;
      background: transparent; color: #333333;
      border: 1px solid #e0e0e0; padding: 6px 12px;
      font-size: 0.72em; letter-spacing: 1px;
      cursor: pointer; outline: none; -webkit-appearance: none;
      display: table-cell; text-align: center;
    }

    .nav-btn:active { background: #f0f0ec; }

    #reader-chapter-info {
      display: table-cell; text-align: center;
      font-size: 0.68em; color: #888888;
      letter-spacing: 2px; vertical-align: middle;
    }

    /* ── RECETAS ─────────────────────────────── */
    .rcp-panel-hdr {
      display: table; width: 100%;
      padding: 8px 14px; border-bottom: 1px solid #e0e0e0;
      background: #ffffff;
    }
    .rcp-panel-hdr-l { display: table-cell; vertical-align: middle; }
    .rcp-panel-hdr-r {
      display: table-cell; vertical-align: middle;
      text-align: right; width: 1%; white-space: nowrap;
    }
    .rcp-hdr-title {
      font-size: 0.65em; letter-spacing: 4px; color: #888888; text-transform: uppercase;
    }

    /* Lista de recetas */
    .rcp-item {
      display: block; padding: 15px 14px;
      border-bottom: 1px solid #e8e8e8;
      background: #ffffff; cursor: pointer; position: relative;
    }
    .rcp-item:active { background: #f0f0ec; }
    .rcp-item-name {
      display: block; font-size: 0.88em; color: #111111;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .rcp-item-arrow {
      position: absolute; right: 14px; top: 50%; margin-top: -7px;
      color: #cccccc; font-size: 0.82em;
    }
    #rcp-list-empty {
      padding: 40px; text-align: center;
      color: #aaaaaa; font-size: 0.78em; letter-spacing: 2px;
    }

    /* Secciones dentro del detalle */
    .rcp-section {
      padding: 7px 14px; font-size: 0.65em;
      letter-spacing: 4px; color: #888888;
      border-bottom: 1px solid #e8e8e8;
      text-transform: uppercase; background: #f5f5f0;
    }

    /* Checklist rows */
    .rcp-check-row {
      display: table; width: 100%; padding: 12px 14px;
      border-bottom: 1px solid #eeeeee;
      background: #ffffff; cursor: pointer;
    }
    .rcp-check-row:active { background: #f5f5f0; }
    .rcp-check-box {
      display: table-cell; width: 32px;
      vertical-align: middle; font-size: 0.85em; color: #333333;
    }
    .rcp-check-body { display: table-cell; vertical-align: middle; }
    .rcp-check-row.checked .rcp-check-body { color: #bbbbbb; text-decoration: line-through; }
    .rcp-ing-qty {
      display: inline-block; width: 80px;
      font-size: 0.78em; color: #666666; vertical-align: middle;
    }
    .rcp-ing-name { font-size: 0.88em; color: #111111; vertical-align: middle; }
    .rcp-step-num {
      display: inline-block; color: #aaaaaa;
      font-size: 0.72em; margin-right: 6px; vertical-align: middle;
    }
    .rcp-step-text { font-size: 0.88em; color: #111111; vertical-align: middle; }

    /* Notas/comentarios */
    .rcp-notes {
      padding: 16px 14px; font-size: 0.85em;
      color: #555555; line-height: 1.8;
      background: #fffef5; border-top: 1px solid #e8e8e8;
    }
    .rcp-notes-label {
      display: block; font-size: 0.72em; letter-spacing: 3px;
      color: #888888; text-transform: uppercase; margin-bottom: 8px;
    }

    /* Formulario de edición */
    .rcp-field-label {
      padding: 7px 14px; font-size: 0.65em;
      letter-spacing: 4px; color: #888888;
      border-bottom: 1px solid #e8e8e8;
      text-transform: uppercase; background: #f5f5f0;
    }
    .rcp-input {
      display: block; width: 100%;
      background: #ffffff; color: #111111;
      border: none; border-bottom: 1px solid #e0e0e0;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.88em; padding: 12px 14px;
      outline: none; -webkit-appearance: none;
    }
    .rcp-input:focus { border-bottom-color: #1a1a1a; background: #fafafa; }

    /* Fila de ingrediente en el editor */
    .rcp-ing-row {
      display: table; width: 100%; border-bottom: 1px solid #eeeeee;
      background: #ffffff;
    }
    .rcp-ing-qty-cell  { display: table-cell; width: 90px; }
    .rcp-ing-name-cell { display: table-cell; }
    .rcp-row-del-cell  { display: table-cell; width: 38px; vertical-align: middle; text-align: center; }

    /* Fila de paso en el editor */
    .rcp-step-row-edit {
      display: table; width: 100%; border-bottom: 1px solid #eeeeee;
      background: #ffffff;
    }
    .rcp-step-num-cell  { display: table-cell; width: 30px; vertical-align: middle;
                          text-align: center; color: #aaaaaa; font-size: 0.72em; }
    .rcp-step-text-cell { display: table-cell; }
    .rcp-del-btn {
      background: transparent; color: #cc2222; border: none;
      font-size: 1.1em; padding: 8px 4px; cursor: pointer;
      min-height: 44px; min-width: 36px; line-height: 1;
      font-family: "Courier New", Courier, monospace; -webkit-appearance: none;
    }
    .rcp-add-btn {
      display: block; width: 100%; padding: 12px 14px;
      background: #f5f5f0; color: #888888;
      border: none; border-bottom: 1px solid #e8e8e8;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.78em; letter-spacing: 2px; text-align: left;
      cursor: pointer; -webkit-appearance: none;
    }
    .rcp-add-btn:active { background: #e8e8e4; color: #111111; }
    .rcp-textarea {
      display: block; width: 100%; background: #ffffff;
      color: #555555; border: none;
      font-family: "Courier New", Courier, monospace;
      font-size: 0.85em; padding: 14px; line-height: 1.8;
      outline: none; resize: none; min-height: 100px; -webkit-appearance: none;
    }
    .rcp-textarea:focus { background: #fafafa; }
    .rcp-action-bar {
      padding: 12px 14px; border-top: 1px solid #e0e0e0; background: #f5f5f0;
    }
    .rcp-btn {
      font-family: "Courier New", Courier, monospace;
      background: transparent; color: #333333; border: 1px solid #cccccc;
      padding: 8px 16px; font-size: 0.75em; letter-spacing: 2px;
      cursor: pointer; outline: none; -webkit-appearance: none;
      margin-right: 8px; min-height: 36px;
    }
    .rcp-btn:active { background: #1a1a1a; color: #ffffff; border-color: #1a1a1a; }
    .rcp-btn.danger { color: #cc2222; border-color: #cc2222; }
    .rcp-btn.danger:active { background: #cc2222; color: #ffffff; }

    /* ── FOOTER ──────────────────────────────── */
    #lmd-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #1a1a1a; border-top: 1px solid #333333;
      padding: 6px 14px; font-size: 0.62em;
      color: #666666; letter-spacing: 2px;
    }

    #footer-count { color: #999999; }

  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="lmd-header">
    <span id="header-logo">[ LMD ]</span>
    <span id="header-status">INICIANDO</span>
    <span id="header-clock">--:--:--</span>
  </div>

  <!-- NAV TABS -->
  <div id="lmd-nav">
    <button class="tab-btn active" id="tab-music"   onclick="switchTab('music')">&#9834; MUSICA</button>
    <button class="tab-btn"        id="tab-books"   onclick="switchTab('books')">&#9632; LIBROS</button>
    <button class="tab-btn"        id="tab-recipes" onclick="switchTab('recipes')">&#9998; RECETAS</button>
  </div>

  <!-- SCROLL AREA -->
  <div id="lmd-main">
    <div id="loading-screen">
      CARGANDO BIBLIOTECA<span class="blink">_</span>
    </div>

    <div id="view-music" class="view">
      <div class="section-label" id="music-label">// MUSICA</div>
      <div id="music-list"></div>
    </div>

    <div id="view-books" class="view">
      <div class="section-label" id="books-label">// LIBROS</div>
      <div id="books-list"></div>
    </div>

    <div id="view-recipes" class="view">

      <!-- LISTA DE RECETAS -->
      <div id="rcp-list-panel">
        <div class="rcp-panel-hdr">
          <div class="rcp-panel-hdr-l">
            <span class="rcp-hdr-title">// RECETAS</span>
          </div>
          <div class="rcp-panel-hdr-r">
            <button class="ctrl-btn" onclick="RCP.showEdit(null)">+ NUEVA</button>
          </div>
        </div>
        <div id="rcp-recipes-list"></div>
        <div id="rcp-list-loading" style="padding:30px;text-align:center;color:#005500;font-size:0.78em;letter-spacing:3px">
          CARGANDO<span class="blink">_</span>
        </div>
      </div>

      <!-- DETALLE / CHECKLIST -->
      <div id="rcp-detail-panel" style="display:none">
        <div class="rcp-panel-hdr">
          <div class="rcp-panel-hdr-l">
            <button class="ctrl-btn" onclick="RCP.showList()">&#9664; LISTA</button>
          </div>
          <div class="rcp-panel-hdr-r">
            <button class="ctrl-btn" onclick="RCP.showEdit(RCP.current.id)">EDITAR</button>
            &nbsp;
            <button class="ctrl-btn" style="color:#ff4141;border-color:#ff4141"
                    onclick="RCP.deleteRecipe(RCP.current.id)">ELIMINAR</button>
          </div>
        </div>
        <div id="rcp-detail-content"></div>
      </div>

      <!-- EDITOR DE RECETA -->
      <div id="rcp-edit-panel" style="display:none">
        <div class="rcp-panel-hdr">
          <div class="rcp-panel-hdr-l">
            <button class="ctrl-btn" onclick="RCP.cancelEdit()">&#9664; VOLVER</button>
          </div>
          <div class="rcp-panel-hdr-r">
            <span id="rcp-edit-mode-label"
                  style="font-size:0.68em;letter-spacing:2px;color:#00aa22"></span>
          </div>
        </div>
        <div id="rcp-edit-content"></div>
      </div>

    </div>
  </div>

  <!-- PLAYER BAR -->
  <div id="player-bar">
    <div id="player-info">
      <span id="player-title-text">--</span>
      <span id="player-artist-text"></span>
    </div>
    <div id="player-controls">
      <div id="player-buttons">
        <button class="ctrl-btn" onclick="Player.prev()">&#9664;&#9664;</button>
        <button class="ctrl-btn" id="btn-play-pause" onclick="Player.togglePlay()">&#9654; PLAY</button>
        <button class="ctrl-btn" onclick="Player.next()">&#9654;&#9654;</button>
      </div>
      <div id="player-prog-cell">
        <div id="player-progress-track" onclick="Player.seek(event)">
          <div id="player-progress-fill"></div>
        </div>
      </div>
      <div id="player-time">
        <span id="player-current">0:00</span>/<span id="player-total">0:00</span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="lmd-footer">
    LMD v1.0 &nbsp;//&nbsp; iPad 2 &nbsp;//&nbsp;
    <span id="footer-count">--</span>
  </div>

  <!-- READER OVERLAY (PDF + EPUB) -->
  <div id="reader-overlay">
    <div id="reader-header">
      <button id="btn-close-reader" onclick="Reader.close()">&#x2717; CERRAR</button>
      <span id="reader-title-text">--</span>
      <span id="reader-badge">--</span>
    </div>
    <div id="reader-content"></div>
    <div id="reader-nav">
      <div id="reader-nav-inner">
        <button class="nav-btn" onclick="EpubReader.prevChapter()">&#9664; ANTERIOR</button>
        <span id="reader-chapter-info">CAP 1/1</span>
        <button class="nav-btn" onclick="EpubReader.nextChapter()">SIGUIENTE &#9654;</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script type="text/javascript">
// ==========================================================
// LMD — Legacy Media Dashboard  v1.0
// ES5 — compatible con Safari iOS 9.3.5
// Sin const / let / arrow / async. Solo var y function.
// ==========================================================

var LMD = {
  library:   null,
  activeTab: 'music'
};

// ── RELOJ ────────────────────────────────────────────────
function tickClock() {
  var now = new Date();
  var h = now.getHours(),   m = now.getMinutes(), s = now.getSeconds();
  h = h < 10 ? '0'+h : ''+h;
  m = m < 10 ? '0'+m : ''+m;
  s = s < 10 ? '0'+s : ''+s;
  var el = document.getElementById('header-clock');
  if (el) { el.textContent = h+':'+m+':'+s; }
}
setInterval(tickClock, 1000);
tickClock();

// ── LAYOUT ───────────────────────────────────────────────
function adjustLayout() {
  var header = document.getElementById('lmd-header');
  var nav    = document.getElementById('lmd-nav');
  var footer = document.getElementById('lmd-footer');
  var player = document.getElementById('player-bar');
  var main   = document.getElementById('lmd-main');
  if (!header || !nav || !footer || !main) { return; }

  var topH    = header.offsetHeight + nav.offsetHeight;
  var footerH = footer.offsetHeight;
  var playerH = (player && player.style.display !== 'none') ? player.offsetHeight : 0;
  var bottomH = footerH + playerH;

  main.style.top    = topH + 'px';
  main.style.bottom = bottomH + 'px';

  // Posicionar player encima del footer
  if (player) { player.style.bottom = footerH + 'px'; }
}

// ── TABS ─────────────────────────────────────────────────
function switchTab(tab) {
  LMD.activeTab = tab;
  var all = ['music','books','recipes'];
  for (var i = 0; i < all.length; i++) {
    var btn  = document.getElementById('tab-' + all[i]);
    var view = document.getElementById('view-' + all[i]);
    if (all[i] === tab) {
      if (btn)  { btn.className  = 'tab-btn active'; }
      if (view) { view.className = 'view active'; }
    } else {
      if (btn)  { btn.className  = 'tab-btn'; }
      if (view) { view.className = 'view'; }
    }
  }
}

// ── FORMATO TIEMPO ────────────────────────────────────────
function fmtTime(sec) {
  if (!sec || isNaN(sec)) { return '0:00'; }
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0'+s : s);
}

// ── RENDER MÚSICA ─────────────────────────────────────────
function renderMusic(tracks) {
  var container = document.getElementById('music-list');
  var label     = document.getElementById('music-label');
  if (!container) { return; }
  label.textContent = '// MUSICA — ' + tracks.length + ' PISTAS';
  container.innerHTML = '';
  if (!tracks.length) {
    container.innerHTML = '<div class="section-label">SIN PISTAS DISPONIBLES</div>';
    return;
  }
  for (var i = 0; i < tracks.length; i++) {
    (function(track, idx) {
      var item = document.createElement('div');
      item.className = 'music-item';
      item.setAttribute('data-index', idx);

      var num = document.createElement('span');
      num.className   = 'music-num';
      num.textContent = (idx+1 < 10 ? '0' : '') + (idx+1);

      var titleEl = document.createElement('span');
      titleEl.className   = 'music-title';
      titleEl.textContent = (track.title || 'SIN TITULO').toUpperCase();

      var metaEl = document.createElement('div');
      metaEl.className   = 'music-meta';
      metaEl.textContent = (track.artist || 'DESCONOCIDO').toUpperCase() +
                           (track.album ? ' — ' + track.album.toUpperCase() : '');

      var durEl = document.createElement('span');
      durEl.className   = 'music-duration';
      durEl.textContent = fmtTime(track.duration);

      item.appendChild(num);
      item.appendChild(titleEl);
      item.appendChild(metaEl);
      item.appendChild(durEl);

      item.onclick = function() { Player.play(idx); };
      container.appendChild(item);
    })(tracks[i], i);
  }
}

// ── RENDER LIBROS ──────────────────────────────────────────
function renderBooks(books) {
  var container = document.getElementById('books-list');
  var label     = document.getElementById('books-label');
  if (!container) { return; }
  label.textContent = '// LIBROS — ' + books.length + ' TITULOS';
  container.innerHTML = '';
  if (!books.length) {
    container.innerHTML = '<div class="section-label">SIN LIBROS DISPONIBLES</div>';
    return;
  }
  for (var i = 0; i < books.length; i++) {
    (function(book, idx) {
      var item = document.createElement('div');
      item.className = 'book-item';

      if (book.cover) {
        var wrap = document.createElement('div');
        wrap.className = 'book-cover-wrap';
        var img = document.createElement('img');
        img.alt = book.title || '';
        img.onerror = function() {
          var ph = document.createElement('div');
          ph.className   = 'book-cover-placeholder';
          ph.textContent = '\u25a3';
          item.insertBefore(ph, wrap);
          item.removeChild(wrap);
        };
        var coverUrl = (book.cover || '').replace(/^\s+/,'');
        img.src = (coverUrl.indexOf('https://') === 0 || coverUrl.indexOf('http://') === 0)
                  ? coverUrl : '';
        wrap.appendChild(img);
        item.appendChild(wrap);
      } else {
        var ph2 = document.createElement('div');
        ph2.className   = 'book-cover-placeholder';
        ph2.textContent = '\u25a3';
        item.appendChild(ph2);
      }

      var titleEl = document.createElement('span');
      titleEl.className   = 'book-title';
      titleEl.textContent = (book.title  || 'SIN TITULO').toUpperCase();
      titleEl.title       = book.title || '';

      var authorEl = document.createElement('span');
      authorEl.className   = 'book-author';
      authorEl.textContent = (book.author || 'AUTOR DESCONOCIDO').toUpperCase();

      var typeEl = document.createElement('span');
      var t = (book.type || 'doc').toLowerCase();
      typeEl.className   = 'book-type-badge ' + t;
      typeEl.textContent = t.toUpperCase();

      item.appendChild(titleEl);
      item.appendChild(authorEl);
      item.appendChild(typeEl);

      item.onclick = function() { Reader.open(idx, item); };
      container.appendChild(item);
    })(books[i], i);
  }
}

// ==========================================================
// PLAYER DE AUDIO
// ==========================================================
var Player = {
  audio:      null,
  trackIndex: -1,
  playing:    false,

  init: function() {
    // iOS Safari requiere:
    // 1. createElement (no new Audio) — el elemento debe pertenecer al documento
    // 2. playsinline — sin esto iOS abre su propio player nativo y falla
    // 3. preload="none" — evita prefetch que consume el gesto de usuario
    // 4. appendChild — el elemento debe estar en el DOM
    var a = document.createElement('audio');
    a.setAttribute('preload', 'none');
    a.setAttribute('playsinline', '');
    a.setAttribute('webkit-playsinline', '');
    a.style.display = 'none';
    document.body.appendChild(a);

    Player.audio = a;
    Player.audio.ontimeupdate     = Player._onTimeUpdate;
    Player.audio.onended          = Player._onEnded;
    Player.audio.onloadedmetadata = Player._onMeta;
    Player.audio.onerror          = Player._onError;
  },

  play: function(idx) {
    if (!LMD.library || !LMD.library.music) { return; }
    var track = LMD.library.music[idx];
    if (!track) { return; }

    // iOS Safari: src + play() PRIMERO antes de cualquier DOM update.
    // Reflow o repaint entre el gesto y play() rompe la cadena de confianza
    // silenciosamente — el audio no arranca y no dispara error.
    Player.audio.src = track.url;
    Player.audio.play();

    // UI updates DESPUÉS del play()
    Player.trackIndex = idx;
    Player.playing    = true;

    var prev = document.querySelector('.music-item.playing');
    if (prev) { prev.className = 'music-item'; }
    var el = document.querySelector('.music-item[data-index="' + idx + '"]');
    if (el) { el.className = 'music-item playing'; }

    document.getElementById('player-title-text').textContent  = (track.title  || '--').toUpperCase();
    document.getElementById('player-artist-text').textContent = (track.artist || '').toUpperCase();
    document.getElementById('player-current').textContent     = '0:00';
    document.getElementById('player-total').textContent       = fmtTime(track.duration);
    document.getElementById('player-progress-fill').style.width = '0%';
    document.getElementById('btn-play-pause').textContent     = '\u23f8 PAUSA';

    document.getElementById('player-bar').style.display = 'block';
    adjustLayout();
  },

  togglePlay: function() {
    if (!Player.audio) { return; }
    if (Player.playing) {
      Player.audio.pause();
      Player.playing = false;
      document.getElementById('btn-play-pause').textContent = '\u25b6 PLAY';
    } else {
      Player.audio.play();
      Player.playing = true;
      document.getElementById('btn-play-pause').textContent = '\u23f8 PAUSA';
    }
  },

  prev: function() {
    if (!LMD.library) { return; }
    var idx = Player.trackIndex - 1;
    if (idx < 0) { idx = LMD.library.music.length - 1; }
    Player.play(idx);
  },

  next: function() {
    if (!LMD.library) { return; }
    var idx = (Player.trackIndex + 1) % LMD.library.music.length;
    Player.play(idx);
  },

  seek: function(e) {
    if (!Player.audio || !Player.audio.duration) { return; }
    var bar  = document.getElementById('player-progress-track');
    var rect = bar.getBoundingClientRect();
    var x    = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var pct  = x / rect.width;
    if (pct < 0) { pct = 0; }
    if (pct > 1) { pct = 1; }
    Player.audio.currentTime = pct * Player.audio.duration;
  },

  _onTimeUpdate: function() {
    var cur = Player.audio.currentTime;
    var dur = Player.audio.duration || 0;
    document.getElementById('player-current').textContent = fmtTime(cur);
    if (dur) {
      document.getElementById('player-progress-fill').style.width =
        Math.floor((cur / dur) * 100) + '%';
    }
  },

  _onMeta: function() {
    document.getElementById('player-total').textContent =
      fmtTime(Player.audio.duration);
  },

  _onEnded: function() {
    Player.next();
  },

  _onError: function() {
    var code = (Player.audio && Player.audio.error) ? Player.audio.error.code : '?';
    // Códigos: 1=aborted 2=network 3=decode 4=format
    document.getElementById('player-title-text').textContent =
      'ERROR AUDIO [cod:' + code + ']';
    document.getElementById('btn-play-pause').textContent = '\u25b6 PLAY';
    Player.playing = false;
  }
};

// ==========================================================
// LECTOR (PDF + EPUB)
// ==========================================================
var Reader = {
  open: function(idx, el) {
    var book = LMD.library.books[idx];
    if (!book) { return; }

    // Marcar libro seleccionado
    var prev = document.querySelector('.book-item.selected');
    if (prev) { prev.className = 'book-item'; }
    if (el) { el.className = 'book-item selected'; }

    // Configurar overlay
    document.getElementById('reader-title-text').textContent =
      (book.title || 'SIN TITULO').toUpperCase();
    document.getElementById('reader-badge').textContent =
      (book.type || 'DOC').toUpperCase();

    // Limpiar contenido previo
    document.getElementById('reader-content').innerHTML = '';
    document.getElementById('reader-nav').style.display = 'none';

    // Abrir — layout manejado por CSS (alturas fijas, sin JS)
    document.getElementById('reader-overlay').style.display = 'block';

    if (book.type === 'epub') {
      EpubReader.open(book);
    } else {
      PdfReader.open(book);
    }
  },

  close: function() {
    document.getElementById('reader-overlay').style.display = 'none';
    document.getElementById('reader-content').innerHTML = '';
    document.getElementById('reader-content').className = ''; // quitar with-nav
    document.getElementById('reader-nav').style.display = 'none';
    EpubReader.reset();
  },

  // Layout manejado por CSS — alturas fijas en px, no JS
};

// ── LECTOR PDF ────────────────────────────────────────────
var PdfReader = {
  open: function(book) {
    var content = document.getElementById('reader-content');
    var iframe  = document.createElement('iframe');
    iframe.src  = book.url;
    // iOS 9 maneja PDF nativo en iframe
    content.appendChild(iframe);
  }
};

// ── LECTOR EPUB ───────────────────────────────────────────
var EpubReader = {
  zip:            null,
  spine:          [],
  currentChapter: 0,

  reset: function() {
    EpubReader.zip   = null;
    EpubReader.spine = [];
    EpubReader.currentChapter = 0;
  },

  open: function(book) {
    var content = document.getElementById('reader-content');
    content.innerHTML =
      '<div style="padding:40px;text-align:center;letter-spacing:3px;color:#00aa22">' +
      'CARGANDO EPUB<span class="blink">_</span></div>';

    var xhr = new XMLHttpRequest();
    xhr.open('GET', book.url, true);
    xhr.responseType = 'arraybuffer';

    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) { return; }
      if (xhr.status === 200) {
        EpubReader._parse(xhr.response);
      } else {
        EpubReader._error('HTTP ' + xhr.status);
      }
    };

    xhr.onerror = function() { EpubReader._error('FALLA DE RED'); };
    xhr.send();
  },

  _parse: function(buffer) {
    try {
      var zip = new JSZip(buffer);
      EpubReader.zip = zip;

      // 1. container.xml → ruta del OPF
      var containerFile = zip.file('META-INF/container.xml');
      if (!containerFile) { throw new Error('container.xml no encontrado'); }
      var containerXml = containerFile.asText();

      var opfMatch = containerXml.match(/full-path="([^"]+)"/);
      if (!opfMatch) { throw new Error('OPF path no encontrado'); }
      var opfPath = opfMatch[1];
      var opfDir  = opfPath.lastIndexOf('/') !== -1
                    ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1)
                    : '';

      // 2. OPF → manifest + spine
      var opfFile = zip.file(opfPath);
      if (!opfFile) { throw new Error('OPF no encontrado'); }
      var opfXml  = opfFile.asText();

      // Manifest: captura el tag <item> completo y extrae id y href
      // independientemente del orden de atributos (href antes o después de id)
      var manifest = {};
      var mReg = /<item([^>]+)>/g;
      var mMatch;
      while ((mMatch = mReg.exec(opfXml)) !== null) {
        var attrs     = mMatch[1];
        var idMatch   = attrs.match(/\bid="([^"]+)"/);
        var hrefMatch = attrs.match(/\bhref="([^"]+)"/);
        if (idMatch && hrefMatch) {
          var href = hrefMatch[1].split('#')[0];
          manifest[idMatch[1]] = href;
        }
      }

      // Spine: orden de lectura
      var spine  = [];
      var sReg   = /<itemref[^>]+idref="([^"]+)"[^>]*\/?>/g;
      var sMatch;
      while ((sMatch = sReg.exec(opfXml)) !== null) {
        var itemHref = manifest[sMatch[1]];
        if (itemHref) {
          // Path completo desde la raíz del ZIP
          var fullPath = opfDir + itemHref;
          spine.push(fullPath);
        }
      }

      if (!spine.length) { throw new Error('Spine vacío — EPUB sin capítulos'); }

      EpubReader.spine          = spine;
      EpubReader.currentChapter = 0;
      EpubReader._renderChapter(0);

    } catch (e) {
      EpubReader._error(e.message);
    }
  },

  _renderChapter: function(idx) {
    var spine = EpubReader.spine;
    var zip   = EpubReader.zip;
    if (!zip || idx < 0 || idx >= spine.length) { return; }
    EpubReader.currentChapter = idx;

    var file = zip.file(spine[idx]);
    if (!file) {
      EpubReader._error('Capítulo no encontrado: ' + spine[idx]);
      return;
    }

    var rawHtml = file.asText();

    // Extraer contenido del body
    var bodyMatch = rawHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
    var bodyContent = bodyMatch ? bodyMatch[1] : rawHtml;

    // Inyectar en el contenedor
    var content = document.getElementById('reader-content');
    content.innerHTML = '<div id="epub-inner">' + bodyContent + '</div>';
    content.scrollTop = 0;

    // Mostrar nav y ajustar content via clase CSS
    var nav = document.getElementById('reader-nav');
    nav.style.display = 'block';
    document.getElementById('reader-content').className = 'with-nav';

    // Actualizar info
    document.getElementById('reader-chapter-info').textContent =
      'CAP ' + (idx + 1) + ' / ' + spine.length;

    // Deshabilitar botones en los extremos
    var prevBtn = nav.querySelector('.nav-btn:first-child');
    var nextBtn = nav.querySelector('.nav-btn:last-child');
    if (prevBtn) { prevBtn.style.visibility = idx === 0              ? 'hidden' : 'visible'; }
    if (nextBtn) { nextBtn.style.visibility = idx === spine.length-1 ? 'hidden' : 'visible'; }
  },

  prevChapter: function() {
    EpubReader._renderChapter(EpubReader.currentChapter - 1);
  },

  nextChapter: function() {
    EpubReader._renderChapter(EpubReader.currentChapter + 1);
  },

  _error: function(msg) {
    document.getElementById('reader-content').innerHTML =
      '<div style="padding:30px;color:#ff4141;letter-spacing:2px">' +
      '&#x2717; ERROR: ' + msg + '</div>';
  }
};

// ── FETCH LIBRARY ──────────────────────────────────────────
function fetchLibrary() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/fetch-library', true);

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) { return; }

    var loading  = document.getElementById('loading-screen');
    var statusEl = document.getElementById('header-status');
    var countEl  = document.getElementById('footer-count');

    if (xhr.status === 200) {
      try {
        var lib   = JSON.parse(xhr.responseText);

        // Reescribir URLs de Dreamhost a /media/ (mismo origen que la app).
        // iOS 9 Safari bloquea audio/video cross-origin sin importar CORS.
        // Vercel reescribe /media/* → ldm.naitcorp.com/* en el edge.
        var music = lib.music || [];
        var books = lib.books || [];
        var i;
        for (i = 0; i < music.length; i++) {
          if (music[i].url) {
            music[i].url = music[i].url.replace('https://ldm.naitcorp.com/', '/media/');
          }
        }
        for (i = 0; i < books.length; i++) {
          if (books[i].url) {
            books[i].url = books[i].url.replace('https://ldm.naitcorp.com/', '/media/');
          }
        }

        LMD.library = lib;

        if (loading)  { loading.style.display = 'none'; }
        if (statusEl) { statusEl.textContent = 'EN LINEA'; statusEl.style.color = '#00ff41'; }
        if (countEl)  { countEl.textContent  = music.length + ' PISTAS / ' + books.length + ' LIBROS'; }

        renderMusic(music);
        renderBooks(books);
        switchTab('music');

      } catch (e) {
        showError('JSON INVALIDO');
      }
    } else {
      showError('ERROR ' + xhr.status);
    }
  };

  xhr.onerror = function() { showError('FALLA DE RED'); };
  xhr.send();
}

function showError(msg) {
  var loading  = document.getElementById('loading-screen');
  var statusEl = document.getElementById('header-status');
  if (loading) {
    loading.innerHTML =
      '<span style="color:#ff4141">&#x2717; ' + msg + '</span><br><br>' +
      '<span style="font-size:0.8em;color:#555;letter-spacing:1px">Verifica tu conexion e intenta de nuevo.</span>';
  }
  if (statusEl) { statusEl.textContent = 'FUERA DE LINEA'; statusEl.style.color = '#ff4141'; }
}

// ==========================================================
// RECETAS — módulo RCP
// ES5 — var/function, localStorage para checklist, XHR para API
// ==========================================================
var RCP = {
  recipes:  [],    // [{id, name}] — lista cargada del servidor
  current:  null,  // receta completa abierta actualmente
  editMode: 'new', // 'new' | 'edit'

  // ── Init ─────────────────────────────────────────────────
  init: function() {
    RCP._showPanel('list');
    RCP.loadList();
  },

  // ── Carga la lista de recetas desde la API ────────────────
  loadList: function() {
    var loadingEl = document.getElementById('rcp-list-loading');
    var listEl    = document.getElementById('rcp-recipes-list');
    if (loadingEl) { loadingEl.style.display = 'block'; }
    if (listEl)    { listEl.innerHTML = ''; }

    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/recipes', true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) { return; }
      if (loadingEl) { loadingEl.style.display = 'none'; }
      if (xhr.status === 200) {
        try {
          RCP.recipes = JSON.parse(xhr.responseText) || [];
          RCP._renderList();
        } catch (e) {
          if (listEl) {
            listEl.innerHTML = '<div style="padding:20px;color:#ff4141;letter-spacing:2px">ERROR AL PARSEAR RESPUESTA</div>';
          }
        }
      } else {
        if (listEl) {
          listEl.innerHTML = '<div style="padding:20px;color:#ff4141;letter-spacing:2px">ERROR ' + xhr.status + '</div>';
        }
      }
    };
    xhr.onerror = function() {
      if (loadingEl) { loadingEl.style.display = 'none'; }
      if (listEl) {
        listEl.innerHTML = '<div style="padding:20px;color:#ff4141;letter-spacing:2px">FALLA DE RED</div>';
      }
    };
    xhr.send();
  },

  // ── Renderiza la lista de recetas ─────────────────────────
  _renderList: function() {
    var listEl = document.getElementById('rcp-recipes-list');
    if (!listEl) { return; }
    listEl.innerHTML = '';

    if (!RCP.recipes.length) {
      listEl.innerHTML = '<div id="rcp-list-empty">SIN RECETAS — TOCA + NUEVA PARA CREAR LA PRIMERA</div>';
      return;
    }

    for (var i = 0; i < RCP.recipes.length; i++) {
      (function(r) {
        var item  = document.createElement('div');
        item.className = 'rcp-item';

        var name  = document.createElement('span');
        name.className   = 'rcp-item-name';
        name.textContent = (r.name || '').toUpperCase();

        var arrow = document.createElement('span');
        arrow.className   = 'rcp-item-arrow';
        arrow.textContent = '>';

        item.appendChild(name);
        item.appendChild(arrow);
        item.onclick = function() { RCP.openRecipe(r.id); };
        listEl.appendChild(item);
      })(RCP.recipes[i]);
    }
  },

  // ── Abre una receta completa (detalle + checklist) ────────
  openRecipe: function(id) {
    var detailEl = document.getElementById('rcp-detail-content');
    if (detailEl) {
      detailEl.innerHTML =
        '<div style="padding:30px;text-align:center;color:#005500;font-size:0.78em;letter-spacing:3px">' +
        'CARGANDO<span class="blink">_</span></div>';
    }
    RCP._showPanel('detail');

    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/recipes?id=' + id, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) { return; }
      if (xhr.status === 200) {
        try {
          RCP.current = JSON.parse(xhr.responseText);
          RCP._renderDetail();
        } catch (e) {
          if (detailEl) {
            detailEl.innerHTML = '<div style="padding:20px;color:#ff4141">ERROR AL CARGAR RECETA</div>';
          }
        }
      } else {
        if (detailEl) {
          detailEl.innerHTML = '<div style="padding:20px;color:#ff4141">ERROR ' + xhr.status + '</div>';
        }
      }
    };
    xhr.onerror = function() {
      if (detailEl) {
        detailEl.innerHTML = '<div style="padding:20px;color:#ff4141">FALLA DE RED</div>';
      }
    };
    xhr.send();
  },

  // ── Renderiza el detalle con checklist ────────────────────
  _renderDetail: function() {
    var r       = RCP.current;
    var detailEl = document.getElementById('rcp-detail-content');
    if (!r || !detailEl) { return; }

    var checks = RCP._getChecks(r.id);
    var html   = '';

    // Título
    html += '<div style="padding:12px 14px;border-bottom:1px solid #003300">';
    html += '<span style="font-size:1em;letter-spacing:2px;text-transform:uppercase">';
    html += RCP._esc(r.name) + '</span></div>';

    // Ingredientes
    if (r.ingredients && r.ingredients.length) {
      html += '<div class="rcp-section">INGREDIENTES — toca para marcar</div>';
      for (var i = 0; i < r.ingredients.length; i++) {
        var ing     = r.ingredients[i];
        var ichk    = checks.ingredients[i] || false;
        html += '<div class="rcp-check-row' + (ichk ? ' checked' : '') + '" onclick="RCP.toggleIng(' + i + ')">';
        html += '<div class="rcp-check-box">' + (ichk ? '[x]' : '[ ]') + '</div>';
        html += '<div class="rcp-check-body">';
        html += '<span class="rcp-ing-qty">'  + RCP._esc(ing.qty  || '') + '</span>';
        html += '<span class="rcp-ing-name">' + RCP._esc(ing.name || '') + '</span>';
        html += '</div></div>';
      }
    }

    // Pasos
    if (r.steps && r.steps.length) {
      html += '<div class="rcp-section">PASOS — toca para marcar</div>';
      for (var j = 0; j < r.steps.length; j++) {
        var step = r.steps[j];
        var schk = checks.steps[j] || false;
        html += '<div class="rcp-check-row' + (schk ? ' checked' : '') + '" onclick="RCP.toggleStep(' + j + ')">';
        html += '<div class="rcp-check-box">' + (schk ? '[x]' : '[ ]') + '</div>';
        html += '<div class="rcp-check-body">';
        html += '<span class="rcp-step-num">' + (j + 1) + '.</span>';
        html += '<span class="rcp-step-text">' + RCP._esc(step.text || '') + '</span>';
        html += '</div></div>';
      }
    }

    // Notas / comentarios
    if (r.comments && r.comments.trim()) {
      html += '<div class="rcp-notes">';
      html += '<span class="rcp-notes-label">NOTAS</span>';
      html += RCP._esc(r.comments).replace(/\n/g, '<br>');
      html += '</div>';
    }

    // Botón reiniciar
    html += '<div class="rcp-action-bar">';
    html += '<button class="rcp-btn" onclick="RCP.resetChecks()">REINICIAR CHECKLIST</button>';
    html += '</div>';

    detailEl.innerHTML = html;
  },

  // ── Toggle ingrediente ────────────────────────────────────
  toggleIng: function(idx) {
    var checks = RCP._getChecks(RCP.current.id);
    checks.ingredients[idx] = !checks.ingredients[idx];
    RCP._saveChecks(RCP.current.id, checks);
    RCP._renderDetail();
  },

  // ── Toggle paso ───────────────────────────────────────────
  toggleStep: function(idx) {
    var checks = RCP._getChecks(RCP.current.id);
    checks.steps[idx] = !checks.steps[idx];
    RCP._saveChecks(RCP.current.id, checks);
    RCP._renderDetail();
  },

  // ── Reinicia todos los checks de la receta actual ─────────
  resetChecks: function() {
    if (!RCP.current) { return; }
    RCP._saveChecks(RCP.current.id, { ingredients: [], steps: [] });
    RCP._renderDetail();
  },

  // ── Muestra el formulario de edición ─────────────────────
  showEdit: function(id) {
    RCP.editMode = id ? 'edit' : 'new';
    var modeEl = document.getElementById('rcp-edit-mode-label');
    if (modeEl) { modeEl.textContent = id ? 'EDITANDO' : 'NUEVA RECETA'; }
    RCP._renderEditForm(id ? RCP.current : null);
    RCP._showPanel('edit');
  },

  // ── Renderiza el formulario de edición ────────────────────
  _renderEditForm: function(recipe) {
    var content = document.getElementById('rcp-edit-content');
    if (!content) { return; }
    var ings     = recipe ? (recipe.ingredients || []) : [];
    var steps    = recipe ? (recipe.steps       || []) : [];
    var comments = recipe ? (recipe.comments    || '') : '';
    var name     = recipe ? (recipe.name        || '') : '';

    var html = '';

    // Nombre
    html += '<div class="rcp-field-label">NOMBRE</div>';
    html += '<input type="text" class="rcp-input" id="rcp-fname" placeholder="NOMBRE DE LA RECETA" value="' + RCP._esc(name) + '">';

    // Ingredientes
    html += '<div class="rcp-field-label">INGREDIENTES</div>';
    html += '<div id="rcp-ing-rows">';
    for (var i = 0; i < ings.length; i++) {
      html += RCP._ingRowHtml(ings[i].qty, ings[i].name);
    }
    html += '</div>';
    html += '<button class="rcp-add-btn" onclick="RCP.addIngRow()">+ AGREGAR INGREDIENTE</button>';

    // Pasos
    html += '<div class="rcp-field-label">PASOS</div>';
    html += '<div id="rcp-step-rows">';
    for (var j = 0; j < steps.length; j++) {
      html += RCP._stepRowHtml(j + 1, steps[j].text);
    }
    html += '</div>';
    html += '<button class="rcp-add-btn" onclick="RCP.addStepRow()">+ AGREGAR PASO</button>';

    // Notas
    html += '<div class="rcp-field-label">NOTAS Y COMENTARIOS</div>';
    html += '<textarea class="rcp-textarea" id="rcp-fcomments" placeholder="NOTAS, SUSTITUCIONES, TIPS...">' + RCP._esc(comments) + '</textarea>';

    // Acciones
    html += '<div class="rcp-action-bar">';
    html += '<button class="rcp-btn" onclick="RCP.save()">GUARDAR</button>';
    html += '<button class="rcp-btn" onclick="RCP.cancelEdit()">CANCELAR</button>';
    html += '</div>';

    content.innerHTML = html;
  },

  // ── Plantillas HTML de filas del editor ───────────────────
  _ingRowHtml: function(qty, name) {
    return '<div class="rcp-ing-row">' +
      '<div class="rcp-ing-qty-cell">' +
        '<input type="text" class="rcp-input rcp-iqty" placeholder="CANT." value="' + RCP._esc(qty || '') + '">' +
      '</div>' +
      '<div class="rcp-ing-name-cell">' +
        '<input type="text" class="rcp-input rcp-iname" placeholder="INGREDIENTE" value="' + RCP._esc(name || '') + '">' +
      '</div>' +
      '<div class="rcp-row-del-cell">' +
        '<button class="rcp-del-btn" onclick="RCP._delRow(this)">x</button>' +
      '</div>' +
    '</div>';
  },

  _stepRowHtml: function(num, text) {
    return '<div class="rcp-step-row-edit">' +
      '<div class="rcp-step-num-cell">' + num + '</div>' +
      '<div class="rcp-step-text-cell">' +
        '<input type="text" class="rcp-input rcp-stext" placeholder="DESCRIPCION DEL PASO" value="' + RCP._esc(text || '') + '">' +
      '</div>' +
      '<div class="rcp-row-del-cell">' +
        '<button class="rcp-del-btn" onclick="RCP._delRow(this);RCP._renumberSteps()">x</button>' +
      '</div>' +
    '</div>';
  },

  // ── Agrega fila de ingrediente ────────────────────────────
  addIngRow: function() {
    var rows = document.getElementById('rcp-ing-rows');
    if (!rows) { return; }
    var tmp = document.createElement('div');
    tmp.innerHTML = RCP._ingRowHtml('', '');
    rows.appendChild(tmp.firstChild);
  },

  // ── Agrega fila de paso ───────────────────────────────────
  addStepRow: function() {
    var rows = document.getElementById('rcp-step-rows');
    if (!rows) { return; }
    var num = rows.children.length + 1;
    var tmp = document.createElement('div');
    tmp.innerHTML = RCP._stepRowHtml(num, '');
    rows.appendChild(tmp.firstChild);
  },

  // ── Elimina la fila que contiene el botón ────────────────
  _delRow: function(btn) {
    var row = btn.parentNode.parentNode;
    if (row && row.parentNode) { row.parentNode.removeChild(row); }
  },

  // ── Renumera los pasos después de eliminar uno ────────────
  _renumberSteps: function() {
    var rows = document.getElementById('rcp-step-rows');
    if (!rows) { return; }
    var items = rows.children;
    for (var i = 0; i < items.length; i++) {
      var numEl = items[i].querySelector('.rcp-step-num-cell');
      if (numEl) { numEl.textContent = (i + 1); }
    }
  },

  // ── Guarda la receta (POST o PUT) ─────────────────────────
  save: function() {
    var nameEl = document.getElementById('rcp-fname');
    var name   = nameEl ? nameEl.value.trim() : '';
    if (!name) {
      nameEl.focus();
      return;
    }

    // Recoger ingredientes
    var ingredients = [];
    var ingRows = document.getElementById('rcp-ing-rows');
    if (ingRows) {
      var irows = ingRows.children;
      for (var i = 0; i < irows.length; i++) {
        var qtyEl  = irows[i].querySelector('.rcp-iqty');
        var nmEl   = irows[i].querySelector('.rcp-iname');
        var n = nmEl ? nmEl.value.trim() : '';
        if (n) {
          ingredients.push({
            qty: qtyEl ? qtyEl.value.trim() : '',
            name: n,
            checked: false
          });
        }
      }
    }

    // Recoger pasos
    var steps = [];
    var stepRows = document.getElementById('rcp-step-rows');
    if (stepRows) {
      var srows = stepRows.children;
      for (var j = 0; j < srows.length; j++) {
        var tEl = srows[j].querySelector('.rcp-stext');
        var t   = tEl ? tEl.value.trim() : '';
        if (t) { steps.push({ text: t, checked: false }); }
      }
    }

    var commentsEl = document.getElementById('rcp-fcomments');
    var comments   = commentsEl ? commentsEl.value.trim() : '';

    var data = { name: name, ingredients: ingredients, steps: steps, comments: comments };

    var isEdit  = RCP.editMode === 'edit' && RCP.current && RCP.current.id;
    var method  = isEdit ? 'PUT'  : 'POST';
    var urlStr  = isEdit ? '/api/recipes?id=' + RCP.current.id : '/api/recipes';

    var xhr = new XMLHttpRequest();
    xhr.open(method, urlStr, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) { return; }
      if (xhr.status === 200) {
        try {
          var resp = JSON.parse(xhr.responseText);
          var targetId = isEdit ? RCP.current.id : resp.id;
          RCP.loadList();           // refrescar lista en background
          RCP.openRecipe(targetId); // ir al detalle de la receta guardada
        } catch (e) {
          RCP.showList();
          RCP.loadList();
        }
      } else {
        alert('Error al guardar (' + xhr.status + ')');
      }
    };
    xhr.onerror = function() { alert('FALLA DE RED al guardar'); };
    xhr.send(JSON.stringify(data));
  },

  // ── Elimina la receta actual ───────────────────────────────
  deleteRecipe: function(id) {
    if (!id) { return; }
    if (!confirm('Eliminar esta receta?')) { return; }
    var xhr = new XMLHttpRequest();
    xhr.open('DELETE', '/api/recipes?id=' + id, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) { return; }
      RCP.current = null;
      RCP.showList();
      RCP.loadList();
    };
    xhr.onerror = function() { alert('FALLA DE RED al eliminar'); };
    xhr.send();
  },

  // ── Cancela el editor y vuelve al panel anterior ──────────
  cancelEdit: function() {
    if (RCP.editMode === 'edit' && RCP.current) {
      RCP._showPanel('detail');
    } else {
      RCP._showPanel('list');
    }
  },

  // ── Muestra el panel de lista ──────────────────────────────
  showList: function() {
    RCP._showPanel('list');
  },

  // ── Controla qué panel es visible dentro de view-recipes ──
  _showPanel: function(panel) {
    var panels = ['list', 'detail', 'edit'];
    for (var k = 0; k < panels.length; k++) {
      var el = document.getElementById('rcp-' + panels[k] + '-panel');
      if (el) { el.style.display = (panels[k] === panel) ? 'block' : 'none'; }
    }
    var main = document.getElementById('lmd-main');
    if (main) { main.scrollTop = 0; }
  },

  // ── localStorage: checks por receta ───────────────────────
  _getChecks: function(id) {
    try {
      var raw = localStorage.getItem('rcp_c_' + id);
      if (raw) { return JSON.parse(raw); }
    } catch (e) {}
    return { ingredients: [], steps: [] };
  },

  _saveChecks: function(id, checks) {
    try { localStorage.setItem('rcp_c_' + id, JSON.stringify(checks)); } catch (e) {}
  },

  // ── Escapado HTML para evitar XSS en innerHTML ────────────
  _esc: function(str) {
    return (str || '').toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
};

// ── INIT ────────────────────────────────────────────────────
window.onload = function() {
  Player.init();
  adjustLayout();
  fetchLibrary();
  RCP.init();
};

window.onresize = function() {
  adjustLayout();
};
</script>
